<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            background-image: url('bghome.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .dashboard-container {
            margin: 80px auto;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { color: #10af33; margin-bottom: 10px; }
        .card-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .card {
            flex: 1 1 250px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 4px solid #10af33;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card i { font-size: 35px; color: #10af33; margin-bottom: 15px; }
        .logout-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            font-weight: 600;
            transition: background 0.3s;
        }
        .logout-btn:hover { background: #e60000; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
        <h1><i class="fa-solid fa-chalkboard-user"></i> Staff Dashboard</h1>
        <p>Welcome, Staff Member. Manage your classes and share updates.</p>
        
        <div class="card-grid">
            <div class="card">
                <i class="fa-solid fa-book"></i>
                <h3>Manage Classes</h3>
                <p>View your classes, upload grades, and check attendance.</p>
            </div>
            <div class="card">
                <i class="fa-solid fa-bullhorn"></i>
                <h3>Post Announcement</h3>
                <p>Share news and files directly with your students.</p>
            </div>
            <div class="card">
                <i class="fa-solid fa-comments"></i>
                <h3>Messages</h3>
                <p>Communicate with students or admins.</p>
            </div>
        </div>
    </div>
</body>
</html>
