<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint Patrick Academy School Portal</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- SweetAlert2 for beautiful popups -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="BG-image fade-in"></div>

    <div class="headline-container slide-down">
        <h1>Making payment easier with School Portal</h1>
    </div>

    <div class="Logo-Holder fade-in-up">
        <div class="Logo">
            <img src="logo.png" alt="Saint Patrick Academy Logo">
        </div>

        <div class="Login-container">
            <form class="Login-form" id="loginForm">
                <h2>Student Login</h2>
                
                <div class="error-msg" id="errorMessage" style="display: none;">Invalid credentials</div>

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="studentId" placeholder="Student ID" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
                
                <button type="submit" class="Login-button">Sign In</button>
            </form>
        </div>
    </div>

    <!-- JavaScript for Form Validation and Password Toggle -->
    <script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Toggle the eye / eye-slash icon
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Form Validation
        const loginForm = document.getElementById('loginForm');
        const studentIdInput = document.getElementById('studentId');
        const errorMessage = document.getElementById('errorMessage');

        const loginBtn = document.querySelector('.Login-button');

        // Reset button state if returning via browser "Back" button
        window.addEventListener('pageshow', function (event) {
            if (event.persisted) {
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
                passwordInput.value = ''; // Clear password for security
            }
        });

        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const studentId = studentIdInput.value.trim();
            const password = passwordInput.value.trim();

            if (studentId === '' || password === '') {
                errorMessage.textContent = 'Please fill out all fields.';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';
            loginBtn.textContent = 'Verifying...';
            loginBtn.disabled = true;

            const url = 'https://script.google.com/macros/s/AKfycbz6cR-xROnKZME0Fu3CSxiyhYlt4gJgcxxx-Wu_DR9sT2d8H4mrPTtU4XM5GWXFjzfe/exec';
            
            try {
                // Using POST without headers defaults to text/plain, avoiding CORS preflight issues with Google Apps Script
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        student_id: studentId,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    // Save user data to localStorage
                    localStorage.setItem('currentUser', JSON.stringify({
                        student_id: studentId,
                        role: result.role,
                        name: result.name,
                        balance: result.balance,
                        status_val: result.status_val,
                        lrn: result.lrn,
                        dob: result.dob,
                        age: result.age,
                        sex: result.sex,
                        contact: result.contact
                    }));

                    await Swal.fire({
                        title: 'Login Successful!',
                        text: 'Welcome to your Student Portal.',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    // Route based on role
                    if (result.role === 'admin') {
                        window.location.href = 'adminportal.html';
                    } else if (result.role === 'staff') {
                        window.location.href = 'staffportal.html';
                    } else {
                        window.location.href = 'studentportal.html';
                    }
                } else {
                    Swal.fire({
                        title: 'Login Failed',
                        text: result.message || 'Incorrect Password or Student ID',
                        icon: 'error',
                        confirmButtonColor: '#008751'
                    });
                    loginBtn.textContent = 'Sign In';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    title: 'Network Error',
                    text: 'Please check your connection and try again.',
                    icon: 'warning',
                    confirmButtonColor: '#008751'
                });
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
