<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint Patrick Academy School Portal</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="BG-image"></div>

    <div class="Logo-Holder">
        <div class="Logo">
            <img src="logo.png" alt="Saint Patrick Academy Logo">
        </div>

        <div class="Login-container">
            <form class="Login-form" id="loginForm">
                <h2>Student Login</h2>
                
                <div class="error-msg" id="errorMessage">Invalid credentials</div>

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="studentId" placeholder="Student ID" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
                
                <button type="submit" class="Login-button">Sign In</button>
            </form>
        </div>
    </div>

    <!-- JavaScript for Form Validation and Password Toggle -->
    <script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Toggle the eye / eye-slash icon
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Form Validation
        const loginForm = document.getElementById('loginForm');
        const studentIdInput = document.getElementById('studentId');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const studentId = studentIdInput.value.trim();
            const password = passwordInput.value.trim();

            if (studentId === '' || password === '') {
                errorMessage.textContent = 'Please fill out all fields.';
                errorMessage.style.display = 'block';
                return;
            }

            const idRegex = /^[0-9]+$/;
            if (!idRegex.test(studentId)) {
                errorMessage.textContent = 'Student ID must contain only numbers.';
                errorMessage.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters.';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';

            // Redirect to the portal
            window.location.href = 'studentportal.html';
        });
    </script>
</body>
</html>
